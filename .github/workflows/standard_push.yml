name: CI
permissions:
    contents: read

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Install Node Dependencies
              run: npm ci

            - name: Setup Biome CLI
              uses: biomejs/setup-biome@29711cbb52afee00eb13aeb30636592f9edc0088 # v2.7.0

            - name: Code quality
              run: biome ci ./src/

            - name: Run tests
              run: xvfb-run -a npm test
